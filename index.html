<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Snake Royale - Lobi & Battle</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* GİRİŞ VE LOBİ EKRANI */
        #lobby-container { background: #1e1e1e; padding: 40px; border-radius: 20px; border: 2px solid #333; width: 350px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 20px; }
        input[type="text"] { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; width: 80%; }
        #player-list { text-align: left; background: #151515; padding: 15px; border-radius: 10px; margin: 20px 0; max-height: 200px; overflow-y: auto; }
        .player-item { padding: 5px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .player-item.ready { color: #2ecc71; }
        
        /* OYUN EKRANI */
        #game-screen { display: none; position: relative; flex-direction: row; gap: 20px; }
        canvas { border: 5px solid #333; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #sidebar { width: 200px; background: #1e1e1e; padding: 20px; border-radius: 10px; border: 2px solid #333; text-align: left; }
        .alive { color: #2ecc71; font-weight: bold; }
        .dead { color: #ff4757; text-decoration: line-through; opacity: 0.6; }

        /* GERİ SAYIM */
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: #f1c40f; display: none; text-shadow: 0 0 20px rgba(0,0,0,1); z-index: 100; }
        
        button { padding: 12px 25px; border-radius: 8px; border: none; background: #3498db; color: white; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #2980b9; }
        button.start-btn { background: #2ecc71; display: none; }
    </style>
</head>
<body>

    <div id="lobby-container">
        <div id="login-view">
            <h2>Snake Royale</h2>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Kullanıcı Adın" maxlength="12">
            </div>
            <div class="input-group">
                Renk: <input type="color" id="colorInput" value="#2ecc71">
            </div>
            <button onclick="joinLobby()">Lobiye Gir</button>
        </div>

        <div id="lobby-view" style="display: none;">
            <h3>Oda Lobisi</h3>
            <div id="player-list"></div>
            <p style="font-size: 12px; color: #888;">Host oyunu başlatınca savaş başlayacak!</p>
            <button id="hostStartBtn" class="start-btn" onclick="requestStart()">OYUNU BAŞLAT</button>
        </div>
    </div>

    <div id="game-screen">
        <div id="countdown">3</div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="sidebar">
            <h4 style="margin-top:0">Oyuncular</h4>
            <div id="status-list"></div>
            <hr border="1">
            <div id="my-info"></div>
            <button onclick="location.reload()" style="background:#444">Lobiden Çık</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBktCn2NgiO0zWrZCSHLsjTXvhkNRDNSi4",
            authDomain: "snake-e0eac.firebaseapp.com",
            databaseURL: "https://snake-e0eac-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "snake-e0eac",
            storageBucket: "snake-e0eac.firebasestorage.app",
            messagingSenderId: "788073914029",
            appId: "1:788073914029:web:dd7fcb83d11483ef31f024"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = Math.random().toString(36).substring(7);

        let myData = { id: myId, name: "", color: "", x: 0, y: 0, dx: 1, dy: 0, tail: [], maxLength: 3, isDead: false, isHost: false };
        let allPlayers = {};
        let gameStatus = "waiting"; // waiting, counting, playing
        let foods = [];

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        const tileCount = 30;

        // LOBİYE GİRİŞ
        function joinLobby() {
            const name = document.getElementById("usernameInput").value;
            if(!name) return alert("İsim yazmalısın!");
            
            myData.name = name;
            myData.color = document.getElementById("colorInput").value;
            
            document.getElementById("login-view").style.display = "none";
            document.getElementById("lobby-view").style.display = "block";
            
            const playerRef = db.ref('players/' + myId);
            playerRef.set(myData);
            playerRef.onDisconnect().remove();

            // İlk giren kişiyi Host yap (Haxball mantığı)
            db.ref('players').once('value', snap => {
                if(Object.keys(snap.val() || {}).length === 1) {
                    myData.isHost = true;
                    playerRef.update({ isHost: true });
                    document.getElementById("hostStartBtn").style.display = "block";
                }
            });
        }

        // OYUNU BAŞLATMA İSTEĞİ (HOST)
        function requestStart() {
            db.ref('game/state').set({ status: "counting", time: Date.now() });
            resetFoods();
        }

        // VERİ DİNLEME
        db.ref('players').on('value', snap => {
            allPlayers = snap.val() || {};
            updateLobbyList();
            updateSidebar();
        });

        db.ref('game/state').on('value', snap => {
            const state = snap.val();
            if(!state) return;

            if(state.status === "counting" && gameStatus === "waiting") {
                startCountdown();
            }
        });

        db.ref('game/foods').on('value', snap => { foods = snap.val() || []; });

        function updateLobbyList() {
            const list = document.getElementById("player-list");
            list.innerHTML = "";
            Object.values(allPlayers).forEach(p => {
                list.innerHTML += `<div class="player-item"><span>${p.isHost ? '👑' : ''} ${p.name}</span> <span style="color:${p.color}">■</span></div>`;
            });
        }

        function updateSidebar() {
            const list = document.getElementById("status-list");
            list.innerHTML = "";
            Object.values(allPlayers).sort((a,b) => b.maxLength - a.maxLength).forEach(p => {
                const statusClass = p.isDead ? "dead" : "alive";
                list.innerHTML += `<div class="${statusClass}">${p.name}: ${p.maxLength}</div>`;
            });
        }

        // GERİ SAYIM VE BAŞLATMA
        function startCountdown() {
            gameStatus = "counting";
            document.getElementById("lobby-container").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";
            const cdDiv = document.getElementById("countdown");
            cdDiv.style.display = "block";
            
            let count = 3;
            const interval = setInterval(() => {
                cdDiv.innerText = count;
                count--;
                if(count < 0) {
                    clearInterval(interval);
                    cdDiv.style.display = "none";
                    gameStatus = "playing";
                    initMyPosition();
                }
            }, 1000);
        }

        function initMyPosition() {
            myData.x = Math.floor(Math.random() * tileCount);
            myData.y = Math.floor(Math.random() * tileCount);
            myData.isDead = false;
            myData.maxLength = 3;
            myData.tail = [];
        }

        // KLAVYE
        document.addEventListener("keydown", e => {
            if(gameStatus !== "playing" || myData.isDead) return;
            if(e.key === "ArrowUp" && myData.dy === 0) { myData.dx = 0; myData.dy = -1; }
            if(e.key === "ArrowDown" && myData.dy === 0) { myData.dx = 0; myData.dy = 1; }
            if(e.key === "ArrowLeft" && myData.dx === 0) { myData.dx = -1; myData.dy = 0; }
            if(e.key === "ArrowRight" && myData.dx === 0) { myData.dx = 1; myData.dy = 0; }
        });

        // OYUN DÖNGÜSÜ
        setInterval(() => {
            if(gameStatus !== "playing") { draw(); return; }
            if(myData.isDead) { draw(); return; }

            myData.x += myData.dx; myData.y += myData.dy;

            // Çarpma Kontrolleri
            if(myData.x < 0 || myData.x >= tileCount || myData.y < 0 || myData.y >= tileCount) return die();
            
            Object.values(allPlayers).forEach(p => {
                if(!p.tail || p.isDead) return;
                p.tail.forEach((seg, i) => {
                    if(myData.x === seg.x && myData.y === seg.y) {
                        if(p.id !== myId || myData.tail.length > 2) die();
                    }
                });
            });

            // Yiyecek
            foods.forEach((f, i) => {
                if(myData.x === f.x && myData.y === f.y) {
                    myData.maxLength++;
                    let newFoods = [...foods];
                    newFoods[i] = {x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount)};
                    db.ref('game/foods').set(newFoods);
                }
            });

            myData.tail.unshift({x: myData.x, y: myData.y});
            while(myData.tail.length > myData.maxLength) myData.tail.pop();
            
            db.ref('players/' + myId).set(myData);
            draw();
        }, 130);

        function die() {
            myData.isDead = true;
            db.ref('players/' + myId).update({ isDead: true });
        }

        function resetFoods() {
            let f = [];
            for(let i=0; i<5; i++) f.push({x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount)});
            db.ref('game/foods').set(f);
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Izgara
            ctx.strokeStyle = "#111";
            for(let i=0; i<canvas.width; i+=grid) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(600,i); ctx.stroke();
            }

            // Elmalar
            ctx.fillStyle = "#ff4757";
            foods.forEach(f => { ctx.beginPath(); ctx.arc(f.x*grid+10, f.y*grid+10, 8, 0, Math.PI*2); ctx.fill(); });

            // Oyuncular
            Object.values(allPlayers).forEach(p => {
                if(!p.tail || p.isDead) return;
                p.tail.forEach((seg, i) => {
                    ctx.fillStyle = i === 0 ? p.color : p.color + "99";
                    ctx.fillRect(seg.x*grid+1, seg.y*grid+1, grid-2, grid-2);
                    if(i === 0) {
                        ctx.fillStyle = "white"; ctx.font = "10px Arial"; ctx.textAlign = "center";
                        ctx.fillText(p.name, seg.x*grid + 10, seg.y*grid - 5);
                    }
                });
            });

            if(myData.isDead) {
                ctx.fillStyle = "rgba(255, 71, 87, 0.5)";
                ctx.font = "30px Arial"; ctx.textAlign = "center";
                ctx.fillText("İZLEYİCİ MODU", canvas.width/2, 50);
            }
        }
    </script>
</body>
</html>
