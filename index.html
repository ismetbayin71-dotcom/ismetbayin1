<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yılan Savaşı: Lobi Sistemi</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Lobi Ekranı Tasarımı */
        #lobby { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 2px solid #333; z-index: 10; }
        input[type="text"] { padding: 12px; border-radius: 8px; border: none; width: 200px; font-size: 16px; margin: 10px; }
        input[type="color"] { padding: 2px; border-radius: 8px; border: none; width: 50px; height: 40px; cursor: pointer; vertical-align: middle; }
        button { padding: 12px 30px; border-radius: 8px; border: none; background: #2ecc71; color: white; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #27ae60; transform: scale(1.05); }

        /* Oyun Ekranı */
        #game-container { display: none; position: relative; }
        canvas { border: 5px solid #333; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .ui-top { display: flex; gap: 20px; margin-bottom: 10px; font-size: 20px; }
        #deadMsg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 3px solid #ff4757; display: none; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>Yılan Savaşı Lobisi</h1>
        <p>Kullanıcı Adın:</p>
        <input type="text" id="usernameInput" placeholder="İsim yaz..." maxlength="10">
        <p>Yılan Rengin:</p>
        <input type="color" id="colorInput" value="#2ecc71">
        <br><br>
        <button onclick="startGame()">Savaşa Katıl!</button>
    </div>

    <div id="game-container">
        <div class="ui-top">
            <span id="playerStatus">Oyuncular: 0</span>
            <span id="scoreText">Boyun: 3</span>
        </div>
        <div id="deadMsg">
            <h2 style="color: #ff4757;">ÖLDÜN!</h2>
            <button onclick="location.reload()">Tekrar Dene</button>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBktCn2NgiO0zWrZCSHLsjTXvhkNRDNSi4",
            authDomain: "snake-e0eac.firebaseapp.com",
            databaseURL: "https://snake-e0eac-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "snake-e0eac",
            storageBucket: "snake-e0eac.firebasestorage.app",
            messagingSenderId: "788073914029",
            appId: "1:788073914029:web:dd7fcb83d11483ef31f024"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = Math.random().toString(36).substring(7);

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        const tileCount = canvas.width / grid;

        let myData = {
            id: myId,
            name: "İsimsiz",
            x: 10, y: 10,
            dx: 1, dy: 0,
            color: "#2ecc71",
            tail: [],
            maxLength: 3,
            isDead: false
        };

        let foods = [];
        let allPlayers = {};
        const playerRef = db.ref('players/' + myId);
        const foodsRef = db.ref('game/foods');

        // OYUNU BAŞLAT
        function startGame() {
            const nameInput = document.getElementById("usernameInput").value;
            if(!nameInput) { alert("Lütfen bir isim seç!"); return; }
            
            myData.name = nameInput;
            myData.color = document.getElementById("colorInput").value;
            
            document.getElementById("lobby").style.display = "none";
            document.getElementById("game-container").style.display = "block";
            
            playerRef.set(myData);
            playerRef.onDisconnect().remove();
            
            // Döngüyü başlat
            setInterval(gameLoop, 120);
        }

        // VERİ DİNLEME
        db.ref('players').on('value', snap => { allPlayers = snap.val() || {}; document.getElementById("playerStatus").innerText = "Oyuncu: " + Object.keys(allPlayers).length; });
        foodsRef.on('value', snap => { foods = snap.val() || []; });

        // Hareket
        document.addEventListener("keydown", e => {
            if(myData.isDead) return;
            if(e.key === "ArrowUp" && myData.dy === 0) { myData.dx = 0; myData.dy = -1; }
            if(e.key === "ArrowDown" && myData.dy === 0) { myData.dx = 0; myData.dy = 1; }
            if(e.key === "ArrowLeft" && myData.dx === 0) { myData.dx = -1; myData.dy = 0; }
            if(e.key === "ArrowRight" && myData.dx === 0) { myData.dx = 1; myData.dy = 0; }
        });

        function gameLoop() {
            if(myData.isDead) return;

            myData.x += myData.dx;
            myData.y += myData.dy;

            // Çarpışma: Duvar
            if(myData.x < 0 || myData.x >= tileCount || myData.y < 0 || myData.y >= tileCount) return gameOver();

            // Çarpışma: Kuyruklar
            Object.values(allPlayers).forEach(p => {
                if(!p.tail) return;
                p.tail.forEach(seg => {
                    if(myData.x === seg.x && myData.y === seg.y) {
                        if(p.id !== myId || myData.tail.length > 2) gameOver();
                    }
                });
            });

            // Elma Yeme
            foods.forEach((f, i) => {
                if(myData.x === f.x && myData.y === f.y) {
                    myData.maxLength++;
                    document.getElementById("scoreText").innerText = "Boyun: " + myData.maxLength;
                    let newFoods = [...foods];
                    newFoods[i] = {x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount)};
                    foodsRef.set(newFoods);
                }
            });

            myData.tail.unshift({x: myData.x, y: myData.y});
            while(myData.tail.length > myData.maxLength) myData.tail.pop();
            
            playerRef.set(myData);
            draw();
        }

        function gameOver() {
            myData.isDead = true;
            document.getElementById("deadMsg").style.display = "block";
            playerRef.remove();
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 5 Elma
            ctx.fillStyle = "#ff4757";
            foods.forEach(f => {
                ctx.beginPath();
                ctx.arc(f.x*grid+10, f.y*grid+10, 8, 0, Math.PI*2);
                ctx.fill();
            });

            // Oyuncular ve İsimler
            Object.values(allPlayers).forEach(p => {
                if(!p.tail) return;
                p.tail.forEach((seg, i) => {
                    ctx.fillStyle = i === 0 ? p.color : p.color + "AA";
                    ctx.fillRect(seg.x*grid+1, seg.y*grid+1, grid-2, grid-2);
                    
                    // İsim Yazdırma (Sadece kafa kısmına)
                    if(i === 0) {
                        ctx.fillStyle = "white";
                        ctx.font = "12px Arial";
                        ctx.textAlign = "center";
                        ctx.fillText(p.name, seg.x*grid + 10, seg.y*grid - 5);
                    }
                });
            });
        }
    </script>
</body>
</html>
