<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Online Yılan Savaşı - Elmalı</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        canvas { border: 5px solid #333; background: #000; margin-top: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { display: flex; justify-content: center; gap: 20px; font-size: 20px; margin: 10px; }
        .score-box { padding: 5px 15px; border-radius: 5px; background: #333; }
    </style>
</head>
<body>
    <h1>Online Yılan Savaşı</h1>
    <div id="ui">
        <div id="status" class="score-box">Bağlanılıyor...</div>
        <div class="score-box">Skorun: <span id="myScore">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Ok tuşlarıyla yön ver. Elmayı kap, puanı kazan!</p>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBktCn2NgiO0zWrZCSHLsjTXvhkNRDNSi4",
            authDomain: "snake-e0eac.firebaseapp.com",
            databaseURL: "https://snake-e0eac-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "snake-e0eac",
            storageBucket: "snake-e0eac.firebasestorage.app",
            messagingSenderId: "788073914029",
            appId: "1:788073914029:web:dd7fcb83d11483ef31f024"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = Math.random().toString(36).substring(7);
        const myColor = '#' + Math.floor(Math.random()*16777215).toString(16);
        
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const status = document.getElementById("status");
        const scoreDisplay = document.getElementById("myScore");

        let myData = { id: myId, x: 10, y: 10, dx: 1, dy: 0, color: myColor, score: 0 };
        let food = { x: 5, y: 5 };
        let allPlayers = {};

        const playerRef = db.ref('players/' + myId);
        const foodRef = db.ref('game/food');

        playerRef.onDisconnect().remove();

        // Veritabanını dinle (Oyuncular)
        db.ref('players').on('value', (snapshot) => {
            allPlayers = snapshot.val() || {};
            status.innerText = "Online: " + Object.keys(allPlayers).length;
        });

        // Veritabanını dinle (Yiyecek)
        foodRef.on('value', (snapshot) => {
            const newFood = snapshot.val();
            if (newFood) food = newFood;
        });

        // Klavye Kontrolü
        document.addEventListener("keydown", e => {
            if(e.key === "ArrowUp" && myData.dy === 0) { myData.dx = 0; myData.dy = -1; }
            if(e.key === "ArrowDown" && myData.dy === 0) { myData.dx = 0; myData.dy = 1; }
            if(e.key === "ArrowLeft" && myData.dx === 0) { myData.dx = -1; myData.dy = 0; }
            if(e.key === "ArrowRight" && myData.dx === 0) { myData.dx = 1; myData.dy = 0; }
        });

        function spawnFood() {
            foodRef.set({
                x: Math.floor(Math.random() * 20),
                y: Math.floor(Math.random() * 20)
            });
        }

        // Oyun Döngüsü
        setInterval(() => {
            myData.x += myData.dx;
            myData.y += myData.dy;

            // Ekran dışı kontrolü
            if(myData.x < 0) myData.x = 19; if(myData.x > 19) myData.x = 0;
            if(myData.y < 0) myData.y = 19; if(myData.y > 19) myData.y = 0;

            // Yiyecek yeme kontrolü
            if(myData.x === food.x && myData.y === food.y) {
                myData.score += 10;
                scoreDisplay.innerText = myData.score;
                spawnFood(); // Yeni yiyecek konumunu Firebase'e gönder
            }

            playerRef.set(myData);
            draw();
        }, 150);

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Izgara
            ctx.strokeStyle = "#111";
            for(let i=0; i<400; i+=20) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(400,i); ctx.stroke();
            }

            // Yiyecek (Elma)
            ctx.fillStyle = "#ff4757";
            ctx.beginPath();
            ctx.arc(food.x * 20 + 10, food.y * 20 + 10, 8, 0, Math.PI * 2);
            ctx.fill();

            // Oyuncular
            Object.values(allPlayers).forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x * 20 + 1, p.y * 20 + 1, 18, 18);
            });
        }
    </script>
</body>
</html>
