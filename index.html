<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Snake Royale - Müdür Kaos Edition</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .screen { background: #1e1e1e; padding: 40px; border-radius: 20px; border: 2px solid #333; width: 350px; box-shadow: 0 0 50px rgba(0,0,0,0.5); display: none; }
        #login-view { display: block; } 
        #game-screen { background: transparent; border: none; width: auto; box-shadow: none; display: none; flex-direction: row; gap: 20px; position: relative; }
        canvas { border: 5px solid #333; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #sidebar { width: 220px; background: #1e1e1e; padding: 20px; border-radius: 10px; border: 2px solid #333; text-align: left; }
        input[type="text"] { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; width: 85%; margin-bottom: 15px; }
        #boss-timer-display { color: #e74c3c; font-weight: bold; font-size: 16px; margin-top: 15px; padding: 10px; background: rgba(231, 76, 60, 0.1); border-radius: 5px; text-align: center; border: 1px solid #e74c3c; }

        #countdown { position: absolute; top: 50%; left: 40%; transform: translate(-50%, -50%); font-size: 150px; font-weight: bold; color: #f1c40f; z-index: 100; pointer-events: none; display: none; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        
        #tension-countdown { 
            position: absolute; top: 50%; left: 40%; transform: translate(-50%, -50%); 
            font-size: 180px; font-weight: bold; color: rgba(255, 255, 255, 0.2); 
            display: none; z-index: 50; pointer-events: none; font-family: 'Arial Black';
            text-align: center; width: 80%; line-height: 1;
            animation: rainbowColors 0.5s linear infinite;
        }

        @keyframes rainbowColors {
            0% { color: rgba(255, 0, 0, 0.2); }
            20% { color: rgba(255, 255, 0, 0.2); }
            40% { color: rgba(0, 255, 0, 0.2); }
            60% { color: rgba(0, 255, 255, 0.2); }
            80% { color: rgba(255, 0, 255, 0.2); }
            100% { color: rgba(255, 0, 0, 0.2); }
        }

        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        #winner-name { color: #2ecc71; font-size: 60px; z-index: 210; }
        button { padding: 12px 25px; border-radius: 8px; border: none; background: #3498db; color: white; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button#readyBtn.ready-on { background: #2ecc71; }
    </style>
</head>
<body>

    <div id="login-view" class="screen">
        <h2>Snake Royale</h2>
        <input type="text" id="usernameInput" placeholder="Kullanıcı Adın" maxlength="12">
        <div style="margin-bottom:10px;">Renk: <input type="color" id="colorInput" value="#2ecc71"></div>
        <button onclick="joinLobby()">Lobiye Katıl</button>
    </div>

    <div id="lobby-view" class="screen">
        <h3>Lobi</h3>
        <div id="player-list"></div>
        <button id="readyBtn" onclick="toggleReady()">HAZIR DEĞİL</button>
    </div>

    <div id="game-screen">
        <div id="countdown">3</div>
        <div id="tension-countdown"></div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="sidebar">
            <h4 style="border-bottom:1px solid #444; padding-bottom:10px;">Skorlar</h4>
            <div id="status-list"></div>
            <div id="boss-timer-display">MÜDÜR: --</div>
            <button onclick="leaveGame()" style="background:#444; margin-top:30px;">Oyundan Çık</button>
        </div>
    </div>

    <div id="victory-screen">
        <div style="font-size:80px; color:#e74c3c; font-weight:bold;">e çok iyi</div> 
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3ezpyHQqRx8RR8qIuLyMRhCmfxnt3YOsISA&s" style="width:200px;">
        <div id="winner-name">...</div>
        <p style="color:#aaa;">Lobiye dönülüyor...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBktCn2NgiO0zWrZCSHLsjTXvhkNRDNSi4",
            authDomain: "snake-e0eac.firebaseapp.com",
            databaseURL: "https://snake-e0eac-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "snake-e0eac",
            storageBucket: "snake-e0eac.firebasestorage.app",
            messagingSenderId: "788073914029",
            appId: "1:788073914029:web:dd7fcb83d11483ef31f024"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let myId = Math.random().toString(36).substring(7);
        let myData = { id: myId, name: "", color: "", x: 0, y: 0, dx: 1, dy: 0, tail: [], maxLength: 3, isDead: false, isReady: false };
        let allPlayers = {};
        let gameStatus = "waiting"; 
        let localInLobby = false;
        let foods = [];
        let bossArrivalAnnounced = false;

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        const tileCount = 30;

        const bossImg = new Image(); bossImg.src = 'boss.png'; 
        let bossData = { active: false, x: 15, y: -6, dx: 0, dy: 1, tail: [], maxLength: 15, timer: 15, state: "waiting", stayTimer: 15 };
        let bossInterval = null;

        function joinLobby() {
            const nameInput = document.getElementById("usernameInput");
            if(!nameInput.value.trim()) return alert("İsim gir!");
            myData.name = nameInput.value;
            myData.color = document.getElementById("colorInput").value;
            db.ref('players').once('value', snap => {
                if (snap.numChildren() === 0) {
                    db.ref('/').update({ 'game/state': { status: "waiting", winner: "", bossTimer: 15, bossActive: false } });
                    resetFoods(); 
                }
                completeJoin();
            });
        }

        function completeJoin() {
            localInLobby = true;
            document.getElementById("login-view").style.display = "none";
            document.getElementById("lobby-view").style.display = "block";
            db.ref('players/' + myId).set(myData);
            db.ref('players/' + myId).onDisconnect().remove();
        }

        function toggleReady() {
            myData.isReady = !myData.isReady;
            const btn = document.getElementById("readyBtn");
            btn.innerText = myData.isReady ? "HAZIRSIN" : "HAZIR DEĞİL";
            btn.classList.toggle("ready-on", myData.isReady);
            db.ref('players/' + myId).update({ isReady: myData.isReady });
        }

        function leaveGame() { db.ref('players/' + myId).remove().then(() => { window.location.reload(); }); }

        db.ref('players').on('value', snap => {
            allPlayers = snap.val() || {};
            let pArr = Object.values(allPlayers);
            if(localInLobby && pArr.length >= 1 && pArr.every(p => p.isReady) && gameStatus === "waiting") {
                if(myId === Object.keys(allPlayers).sort()[0]) db.ref('game/state').update({ status: "counting" });
            }
            if(gameStatus === "playing" && pArr.length > 1 && pArr.filter(p => !p.isDead).length === 1) {
                if(myId === Object.keys(allPlayers).sort()[0]) db.ref('game/state').update({ status: "finished", winner: pArr.find(p => !p.isDead).name });
            }
            updateLobbyUI(); updateSidebarUI();
        });

        db.ref('game/state').on('value', snap => {
            const state = snap.val();
            if(!state || !localInLobby) return;
            if(state.status === "counting" && gameStatus === "waiting") startCountdown();
            if(state.status === "finished" && gameStatus !== "finished") showWinnerUI(state.winner);
            
            if(state.bossTimer !== undefined) {
                bossData.timer = state.bossTimer;
                const display = document.getElementById("boss-timer-display");
                const tension = document.getElementById("tension-countdown");
                
                if(bossData.timer > 0) {
                    display.innerText = "MÜDÜR GELİYO: " + bossData.timer;
                    bossArrivalAnnounced = false;
                    if(bossData.timer <= 3 && gameStatus === "playing") {
                        tension.innerText = bossData.timer;
                        tension.style.display = "block";
                        tension.style.fontSize = "300px";
                    } else { tension.style.display = "none"; }
                } else { 
                    display.innerText = "MÜDÜR GELDİ!";
                    if(!bossArrivalAnnounced && gameStatus === "playing") {
                        bossArrivalAnnounced = true;
                        tension.innerText = "MÜDÜR GELDİ!";
                        tension.style.display = "block";
                        tension.style.fontSize = "120px";
                        setTimeout(() => { tension.style.display = "none"; }, 3000);
                    }
                }
            }
            bossData.active = state.bossActive || false;
        });

        db.ref('game/foods').on('value', snap => { foods = snap.val() || []; });

        function startCountdown() {
            gameStatus = "counting";
            document.getElementById("lobby-view").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";
            
            // KONUMLARI HEMEN BELİRLE Kİ GERİ SAYIMDA GÖZÜKSÜN
            calculateSpawnPosition();
            myData.isDead = false; // Ölü olma durumunu sıfırla
            db.ref('players/' + myId).set(myData); 

            let c = 3;
            const cd = document.getElementById("countdown");
            cd.style.display = "block";
            cd.innerText = c;

            const timer = setInterval(() => {
                c--;
                if(c <= 0) { 
                    clearInterval(timer); 
                    cd.style.display = "none"; 
                    gameStatus = "playing"; 
                    if(myId === Object.keys(allPlayers).sort()[0]) startBossLoop(15); 
                } else {
                    cd.innerText = c;
                }
            }, 1000);
        }

        function startBossLoop(startTime) {
            if (bossInterval) clearInterval(bossInterval);
            let timeLeft = startTime;
            db.ref('game/state').update({ bossTimer: timeLeft });
            bossInterval = setInterval(() => {
                if(gameStatus !== "playing") return clearInterval(bossInterval);
                if(bossData.state === "waiting") {
                    timeLeft--;
                    db.ref('game/state').update({ bossTimer: timeLeft });
                    if(timeLeft <= 0) { bossData.state = "entering"; db.ref('game/state').update({ bossActive: true }); bossData.stayTimer = 15; }
                } else if(bossData.state === "active") {
                    bossData.stayTimer--;
                    if(bossData.stayTimer <= 0) bossData.state = "exiting";
                }
            }, 1000);
        }

        setInterval(() => {
            // SADECE PLAYING DURUMUNDA HAREKET ET
            if(gameStatus === "playing" && !myData.isDead) {
                myData.x = (myData.x + myData.dx + tileCount) % tileCount;
                myData.y = (myData.y + myData.dy + tileCount) % tileCount;
                if(bossData.active) moveBossLogic();
                checkCollisions();
                foods.forEach((f, i) => {
                    if(myData.x === f.x && myData.y === f.y) {
                        myData.maxLength++;
                        let n = [...foods]; n[i] = {x:Math.floor(Math.random()*tileCount), y:Math.floor(Math.random()*tileCount)};
                        db.ref('game/foods').set(n);
                    }
                });
                myData.tail.unshift({x:myData.x, y:myData.y});
                while(myData.tail.length > myData.maxLength) myData.tail.pop();
                db.ref('players/' + myId).set(myData);
            }
            // DRAW HER ZAMAN ÇALIŞIR (Counting dahil)
            draw();
        }, 130);

        function moveBossLogic() {
            if(bossData.state === "entering") { bossData.y += 1; if(bossData.y >= 5) bossData.state = "active"; }
            else if(bossData.state === "active") {
                if(Math.random() < 0.15) {
                    const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
                    const d = dirs[Math.floor(Math.random()*4)];
                    bossData.dx = d.x; bossData.dy = d.y;
                }
                bossData.x += bossData.dx; bossData.y += bossData.dy;
                if(bossData.x < 2) bossData.x = 2; if(bossData.x > 27) bossData.x = 27;
                if(bossData.y < 2) bossData.y = 2; if(bossData.y > 27) bossData.y = 27;
            } else if(bossData.state === "exiting") {
                if(bossData.x < 15) bossData.x++; else if(bossData.x > 15) bossData.x--;
                if(bossData.y > -6) bossData.y--;
                if(bossData.y <= -6) {
                    bossData.state = "waiting";
                    db.ref('game/state').update({ bossActive: false, bossTimer: 60 });
                    if(myId === Object.keys(allPlayers).sort()[0]) startBossLoop(60);
                }
            }
            bossData.tail.unshift({x: bossData.x, y: bossData.y});
            if(bossData.tail.length > bossData.maxLength) bossData.tail.pop();
        }

        function checkCollisions() {
            if(bossData.active) {
                if(myData.x >= bossData.x-2 && myData.x <= bossData.x+2 && myData.y >= bossData.y-2 && myData.y <= bossData.y+2) die();
                bossData.tail.forEach(t => { if(myData.x === t.x && myData.y === t.y) die(); });
            }
            Object.values(allPlayers).forEach(p => {
                if(!p.tail || p.isDead) return;
                p.tail.forEach(seg => { if(myData.x === seg.x && myData.y === seg.y && (p.id !== myId || myData.tail.length > 2)) die(); });
            });
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#333"; ctx.fillRect(13*grid, 0, 4*grid, 8); 
            
            // ELMALARI ÇİZ
            ctx.fillStyle = "#ff4757"; foods.forEach(f => ctx.fillRect(f.x*grid+2, f.y*grid+2, grid-4, grid-4));

            // YILANLARI ÇİZ (Hem Counting hem Playing durumunda)
            Object.values(allPlayers).forEach(p => {
                if(!p.tail || p.isDead) return;
                p.tail.forEach((seg, i) => {
                    ctx.fillStyle = i === 0 ? p.color : p.color + "99";
                    ctx.fillRect(seg.x*grid+1, seg.y*grid+1, grid-2, grid-2);
                    if(i === 0) { ctx.fillStyle = "white"; ctx.font = "10px Arial"; ctx.fillText(p.name, seg.x*grid, seg.y*grid-5); }
                });
            });

            if(bossData.active) {
                ctx.fillStyle = "rgba(255,0,0,0.5)"; bossData.tail.forEach(t => ctx.fillRect(t.x*grid, t.y*grid, grid-1, grid-1));
                if(bossImg.complete) ctx.drawImage(bossImg, (bossData.x - 2) * grid, (bossData.y - 2) * grid, grid * 5, grid * 5);
            }
        }

        function die() { myData.isDead = true; db.ref('players/' + myId).update({ isDead: true }); }

        function showWinnerUI(name) {
            gameStatus = "finished";
            const vs = document.getElementById("victory-screen");
            document.getElementById("winner-name").innerText = name;
            vs.style.display = "flex";
            setTimeout(() => { vs.style.display = "none"; document.getElementById("game-screen").style.display = "none"; document.getElementById("lobby-view").style.display = "block"; resetLocalData(); }, 6000);
        }

        function resetLocalData() {
            myData.isReady = false; myData.isDead = false; myData.tail = []; myData.maxLength = 3;
            if (bossInterval) clearInterval(bossInterval);
            document.getElementById("readyBtn").innerText = "HAZIR DEĞİL";
            document.getElementById("readyBtn").classList.remove("ready-on");
            bossData = { active: false, x: 15, y: -6, dx: 0, dy: 1, tail: [], maxLength: 15, timer: 15, state: "waiting", stayTimer: 15 };
            db.ref('players/' + myId).set(myData);
            gameStatus = "waiting";
        }

        function calculateSpawnPosition() {
            myData.x = Math.floor(Math.random()*20 + 5); 
            myData.y = Math.floor(Math.random()*20 + 5);
            myData.dx = 1; myData.dy = 0; 
            myData.tail = [{x:myData.x, y:myData.y}];
            myData.maxLength = 3;
        }

        function resetFoods() {
            let f = []; for(let i=0; i<8; i++) f.push({x:Math.floor(Math.random()*tileCount), y:Math.floor(Math.random()*tileCount)});
            db.ref('game/foods').set(f);
        }

        function updateLobbyUI() {
            const list = document.getElementById("player-list"); list.innerHTML = "";
            Object.values(allPlayers).forEach(p => { list.innerHTML += `<div class="player-item"><span>${p.name}</span><span>${p.isReady?'HAZIR':'...'}</span></div>`; });
        }

        function updateSidebarUI() {
            const list = document.getElementById("status-list"); list.innerHTML = "";
            Object.values(allPlayers).sort((a,b)=>b.maxLength-a.maxLength).forEach(p=>{
                list.innerHTML += `<div style="color:${p.color}; font-weight:bold; ${p.isDead?'text-decoration:line-through;opacity:0.5':''}">${p.name}: ${p.maxLength}</div>`;
            });
        }

        document.addEventListener("keydown", e => {
            if(gameStatus !== "playing" || myData.isDead) return;
            if(e.key === "ArrowUp" && myData.dy !== 1) { myData.dx = 0; myData.dy = -1; }
            else if(e.key === "ArrowDown" && myData.dy !== -1) { myData.dx = 0; myData.dy = 1; }
            else if(e.key === "ArrowLeft" && myData.dx !== 1) { myData.dx = -1; myData.dy = 0; }
            else if(e.key === "ArrowRight" && myData.dx !== -1) { myData.dx = 1; myData.dy = 0; }
        });
    </script>
</body>
</html>
