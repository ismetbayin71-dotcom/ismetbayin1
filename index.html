<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yılan Oyunu - GitHub Pages</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            text-align: center;
        }

        canvas {
            border: 4px solid #ecf0f1;
            background-color: #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #scoreBoard {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #restartBtn {
            display: none; /* Başlangıçta gizli */
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
        }
        #restartBtn:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="scoreBoard">Skor: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <br>
        <button id="restartBtn" onclick="resetGame()">Tekrar Oyna</button>
        <p>Hareket etmek için ok tuşlarını kullanın.</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const restartBtn = document.getElementById("restartBtn");

        // Oyun Ayarları
        const gridSize = 20; // Her bir karenin boyutu (px)
        const tileCount = canvas.width / gridSize; // Toplam kare sayısı (en/boy)
        let gameSpeed = 100; // Oyun hızı (ms) - ne kadar düşükse o kadar hızlı

        // Yılan ve Yem Değişkenleri
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0; // Yatay hız (yön)
        let dy = 0; // Dikey hız (yön)
        let score = 0;
        let isGameOver = false;
        let gameInterval;

        // Klavyeyi dinle
        document.addEventListener("keydown", changeDirection);

        // Oyunu Başlat
        initGame();

        function initGame() {
            // Başlangıç yılanı (ortada)
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 }
            ];
            score = 0;
            dx = 1; // Başlangıçta sağa git
            dy = 0;
            isGameOver = false;
            scoreElement.innerText = score;
            restartBtn.style.display = "none";
            placeFood();
            
            // Eğer varsa eski zamanlayıcıyı temizle ve yenisini başlat
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        // Ana Oyun Döngüsü
        function gameLoop() {
            update();
            draw();
        }

        // Mantığı Güncelle (Hareket, Çarpışma)
        function update() {
            if (isGameOver) return;

            // Yılanın kafasının yeni pozisyonu
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // -- Duvara Çarpma Kontrolü --
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // -- Kendi Kendine Çarpma Kontrolü --
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            // Yeni kafayı yılanın başına ekle
            snake.unshift(head);

            // -- Yem Yeme Kontrolü --
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                placeFood();
                // Opsiyonel: Her yem yediğinde hızı biraz artırabilirsin
                // clearInterval(gameInterval);
                // gameSpeed = Math.max(30, gameSpeed - 2); 
                // gameInterval = setInterval(gameLoop, gameSpeed);
            } else {
                // Yem yemediysen, yılanın kuyruğunu sil (böylece hareket ediyormuş gibi görünür)
                snake.pop();
            }
        }

        // Ekrana Çiz
        function draw() {
            // Arka planı temizle
            ctx.fillStyle = "#34495e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Yemi çiz
            ctx.fillStyle = "#e74c3c"; // Kırmızı
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // Yılanı çiz
            ctx.fillStyle = "#2ecc71"; // Yeşil
            snake.forEach((part, index) => {
                // Kafayı biraz daha koyu yeşil yapabiliriz
                if (index === 0) ctx.fillStyle = "#27ae60"; 
                else ctx.fillStyle = "#2ecc71";
                
                // Kareler arası boşluk için -2
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // Game Over Yazısı
            if (isGameOver) {
                ctx.fillStyle = "white";
                ctx.font = "40px 'Segoe UI'";
                ctx.textAlign = "center";
                ctx.fillText("OYUN BİTTİ!", canvas.width / 2, canvas.height / 2);
            }
        }

        // Rastgele Yem Yerleştir
        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Yemin yılanın üzerine gelmediğinden emin ol
            for (let i = 0; i < snake.length; i++) {
                if (food.x === snake[i].x && food.y === snake[i].y) {
                    placeFood(); // Tekrar dene
                    break;
                }
            }
        }

        // Klavye Yön Kontrolü
        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;

            // Geriye dönmeyi engelle (örn: sağa giderken sola basamazsın)
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -1;
                dy = 0;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -1;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = 1;
                dy = 0;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = 1;
            }
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameInterval);
            restartBtn.style.display = "inline-block";
        }

        function resetGame() {
            initGame();
        }

    </script>
</body>
</html>
