<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Online Yılan Savaşı: Hardcore Mod</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 8px solid #333; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #ui { display: flex; gap: 30px; font-size: 24px; margin-bottom: 15px; font-weight: bold; }
        .stat { padding: 10px 20px; border-radius: 10px; background: #1e1e1e; border-bottom: 4px solid #444; }
        .dead-msg { color: #ff4757; font-size: 40px; position: absolute; display: none; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border: 2px solid #ff4757; }
    </style>
</head>
<body>

    <h1>Online Yılan Savaşı</h1>
    <div id="ui">
        <div class="stat" id="status">Bağlanılıyor...</div>
        <div class="stat" style="border-color: #2ecc71;">Boyun: <span id="myScore">3</span></div>
    </div>

    <div id="deadMsg" class="dead-msg">ÖLDÜN! <br> <span style="font-size: 20px;">Yenilenmek için sayfayı yenile (F5)</span></div>
    
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBktCn2NgiO0zWrZCSHLsjTXvhkNRDNSi4",
            authDomain: "snake-e0eac.firebaseapp.com",
            databaseURL: "https://snake-e0eac-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "snake-e0eac",
            storageBucket: "snake-e0eac.firebasestorage.app",
            messagingSenderId: "788073914029",
            appId: "1:788073914029:web:dd7fcb83d11483ef31f024"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = Math.random().toString(36).substring(7);
        const myColor = '#' + Math.floor(Math.random()*16777215).toString(16);
        
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const status = document.getElementById("status");
        const scoreDisplay = document.getElementById("myScore");
        const deadMsg = document.getElementById("deadMsg");

        const grid = 20;
        const tileCount = canvas.width / grid; // 30x30'luk büyük alan

        let myData = {
            id: myId,
            x: Math.floor(Math.random() * 25),
            y: Math.floor(Math.random() * 25),
            dx: 1, dy: 0,
            color: myColor,
            tail: [],
            maxLength: 3,
            isDead: false
        };

        let foods = [];
        let allPlayers = {};

        const playerRef = db.ref('players/' + myId);
        const foodsRef = db.ref('game/foods');

        playerRef.onDisconnect().remove();

        // Diğer oyuncuları izle
        db.ref('players').on('value', (snapshot) => {
            allPlayers = snapshot.val() || {};
            status.innerText = "Oyuncu: " + Object.keys(allPlayers).length;
        });

        // Elmaları izle
        foodsRef.on('value', (snapshot) => {
            foods = snapshot.val() || [];
        });

        // İlk girişte elma yoksa 5 tane oluştur (Sadece bir oyuncunun yapması yeterli)
        foodsRef.get().then((snapshot) => {
            if (!snapshot.exists() || snapshot.val().length < 5) {
                resetFoods();
            }
        });

        function resetFoods() {
            let newFoods = [];
            for(let i=0; i<5; i++) {
                newFoods.push({x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)});
            }
            foodsRef.set(newFoods);
        }

        document.addEventListener("keydown", e => {
            if(myData.isDead) return;
            if(e.key === "ArrowUp" && myData.dy === 0) { myData.dx = 0; myData.dy = -1; }
            if(e.key === "ArrowDown" && myData.dy === 0) { myData.dx = 0; myData.dy = 1; }
            if(e.key === "ArrowLeft" && myData.dx === 0) { myData.dx = -1; myData.dy = 0; }
            if(e.key === "ArrowRight" && myData.dx === 0) { myData.dx = 1; myData.dy = 0; }
        });

        setInterval(() => {
            if(myData.isDead) return;

            myData.x += myData.dx;
            myData.y += myData.dy;

            // Duvarlara çarpma
            if(myData.x < 0 || myData.x >= tileCount || myData.y < 0 || myData.y >= tileCount) {
                gameOver();
            }

            // Kendi kuyruğuna veya başkasına çarpma kontrolü
            Object.values(allPlayers).forEach(p => {
                if(!p.tail) return;
                p.tail.forEach(seg => {
                    // Eğer kafa, herhangi bir kuyruk parçasıyla çakışırsa (kendisi hariç başlangıçta)
                    if(myData.x === seg.x && myData.y === seg.y) {
                        // Kendi kafasına çarpmasın diye küçük bir kontrol
                        if(p.id !== myId || myData.tail.length > 2) {
                            gameOver();
                        }
                    }
                });
            });

            // Elma yeme kontrolü
            foods.forEach((f, index) => {
                if(myData.x === f.x && myData.y === f.y) {
                    myData.maxLength++;
                    scoreDisplay.innerText = myData.maxLength;
                    // O elmayı güncelle
                    let updatedFoods = [...foods];
                    updatedFoods[index] = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)};
                    foodsRef.set(updatedFoods);
                }
            });

            myData.tail.unshift({x: myData.x, y: myData.y});
            while(myData.tail.length > myData.maxLength) myData.tail.pop();

            playerRef.set(myData);
            draw();
        }, 120);

        function gameOver() {
            myData.isDead = true;
            deadMsg.style.display = "block";
            playerRef.remove();
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Izgara
            ctx.strokeStyle = "#111";
            for(let i=0; i<canvas.width; i+=grid) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }

            // 5 Elma
            ctx.fillStyle = "#ff4757";
            foods.forEach(f => {
                ctx.beginPath();
                ctx.arc(f.x * grid + 10, f.y * grid + 10, 8, 0, Math.PI * 2);
                ctx.fill();
            });

            // Oyuncular
            Object.values(allPlayers).forEach(p => {
                if(p.tail) {
                    p.tail.forEach((seg, i) => {
                        ctx.fillStyle = i === 0 ? p.color : p.color + "AA";
                        ctx.fillRect(seg.x * grid + 1, seg.y * grid + 1, grid - 2, grid - 2);
                    });
                }
            });
        }
    </script>
</body>
</html>
