<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Snake Royale - BOSS UPDATE</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .screen { background: #1e1e1e; padding: 40px; border-radius: 20px; border: 2px solid #333; width: 350px; box-shadow: 0 0 50px rgba(0,0,0,0.5); display: none; }
        #login-view { display: block; }
        #game-screen { background: transparent; border: none; width: auto; display: none; flex-direction: row; gap: 20px; position: relative; }
        canvas { border: 5px solid #333; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #sidebar { width: 220px; background: #1e1e1e; padding: 20px; border-radius: 10px; border: 2px solid #333; text-align: left; }
        #countdown { position: absolute; top: 50%; left: 40%; transform: translate(-50%, -50%); font-size: 150px; font-weight: bold; color: #f1c40f; display: none; z-index: 100; pointer-events: none; }
        #boss-timer { color: #e74c3c; font-weight: bold; font-size: 18px; margin-top: 10px; }
        
        /* Kazanan Ekranı */
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        #victory-image { width: 250px; border-radius: 15px; }
        #praise-text { font-size: 60px; color: #e74c3c; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="login-view" class="screen">
        <h2>Snake Royale</h2>
        <input type="text" id="usernameInput" placeholder="Kullanıcı Adın" maxlength="12" style="padding:10px; width:80%;">
        <br><br>
        <button onclick="joinLobby()" style="padding:10px 20px; cursor:pointer;">Lobiye Katıl</button>
    </div>

    <div id="lobby-view" class="screen">
        <h3>Lobi</h3>
        <div id="player-list"></div>
        <button id="readyBtn" onclick="toggleReady()" style="padding:10px 20px; margin-top:20px;">HAZIR DEĞİL</button>
    </div>

    <div id="game-screen">
        <div id="countdown">3</div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="sidebar">
            <h4>Skor Tablosu</h4>
            <div id="status-list"></div>
            <div id="boss-timer">BOSS GELİYOR: --</div>
        </div>
    </div>

    <div id="victory-screen">
        <div id="praise-text">e çok iyi</div>
        <img id="victory-image" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3ezpyHQqRx8RR8qIuLyMRhCmfxnt3YOsISA&s">
        <h1 id="winner-name" style="color:#f1c40f"></h1>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        // Firebase ayarlarını buraya kendi bilgilerinle tekrar ekle (yukarıdaki koddan kopyala)
        const firebaseConfig = { /* ... senin config bilgilerin ... */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = Math.random().toString(36).substring(7);
        let myData = { id: myId, name: "", color: "#2ecc71", x: 0, y: 0, dx: 1, dy: 0, tail: [], maxLength: 3, isDead: false, isReady: false };
        let allPlayers = {};
        let gameStatus = "waiting";
        let foods = [];
        const grid = 20;
        const tileCount = 30;
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // BOSS AYARLARI
        const bossImg = new Image();
        bossImg.src = 'boss.png'; // GitHub ana klasöründeki dosya
        let bossSnake = {
            active: false,
            x: 13, y: -5, // Kapının dışında başlar
            dx: 0, dy: 1,
            tail: [],
            maxLength: 10,
            timer: 15
        };

        function joinLobby() {
            myData.name = document.getElementById("usernameInput").value;
            if(!myData.name) return;
            document.getElementById("login-view").style.display = "none";
            document.getElementById("lobby-view").style.display = "block";
            db.ref('players/' + myId).set(myData);
            db.ref('players/' + myId).onDisconnect().remove();
        }

        function toggleReady() {
            myData.isReady = !myData.isReady;
            document.getElementById("readyBtn").innerText = myData.isReady ? "HAZIRSIN" : "HAZIR DEĞİL";
            db.ref('players/' + myId).update({ isReady: myData.isReady });
        }

        // Oyun Döngüsü ve Boss Mantığı
        setInterval(() => {
            if(gameStatus === "playing") {
                // Boss Zamanlayıcı Kontrolü (Sadece lider yönetir)
                const leader = Object.keys(allPlayers).sort()[0];
                if(myId === leader && bossSnake.timer > 0) {
                    bossSnake.timer -= 0.13; // Saniyede yaklaşık bir düşüş
                    db.ref('game/boss').update({ timer: Math.ceil(bossSnake.timer) });
                }

                if(bossSnake.timer <= 0 && !bossSnake.active) {
                    bossSnake.active = true;
                }

                if(bossSnake.active) {
                    moveBoss();
                }

                if(!myData.isDead) {
                    movePlayer();
                    checkBossCollision();
                }
            }
            draw();
        }, 130);

        function moveBoss() {
            // Boss rastgele hareket yapay zekası
            if(Math.random() < 0.05) { // %5 ihtimalle yön değiştir
                const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
                const newDir = dirs[Math.floor(Math.random()*dirs.length)];
                bossSnake.dx = newDir.x; bossSnake.dy = newDir.y;
            }

            bossSnake.x += bossSnake.dx;
            bossSnake.y += bossSnake.dy;

            // Kenarlardan dönme (5x5 kafa olduğu için kenar payı bırakıyoruz)
            if(bossSnake.x < 0) bossSnake.dx = 1;
            if(bossSnake.x > tileCount - 5) bossSnake.dx = -1;
            if(bossSnake.y < 0) bossSnake.dy = 1;
            if(bossSnake.y > tileCount - 5) bossSnake.dy = -1;

            bossSnake.tail.unshift({x: bossSnake.x, y: bossSnake.y});
            if(bossSnake.tail.length > bossSnake.maxLength) bossSnake.tail.pop();
        }

        function checkBossCollision() {
            // Boss kafası 5x5 olduğu için kontrol alanı:
            const bx = bossSnake.x;
            const by = bossSnake.y;

            // Oyuncunun kafası Boss'un 5x5'lik alanına girdi mi?
            if(myData.x >= bx && myData.x < bx+5 && myData.y >= by && myData.y < by+5) {
                die();
            }

            // Boss'un kuyruğuna çarptı mı?
            bossSnake.tail.forEach(seg => {
                if(myData.x === seg.x && myData.y === seg.y) die();
            });
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Kapıyı çiz (Üst orta)
            ctx.fillStyle = "#333";
            ctx.fillRect(13 * grid, 0, 4 * grid, 10); // Giriş kapısı

            // Boss'u çiz
            if(bossSnake.active) {
                // Kuyruk
                ctx.fillStyle = "#4a0000";
                bossSnake.tail.forEach(seg => {
                    ctx.fillRect(seg.x * grid, seg.y * grid, grid-1, grid-1);
                });
                // 5x5 Devasa Kafa
                if(bossImg.complete) {
                    ctx.drawImage(bossImg, bossSnake.x * grid, bossSnake.y * grid, grid * 5, grid * 5);
                } else {
                    ctx.fillStyle = "red";
                    ctx.fillRect(bossSnake.x * grid, bossSnake.y * grid, grid * 5, grid * 5);
                }
            }

            // Oyuncuları çiz (Önceki kodundaki çizim mantığı)
            Object.values(allPlayers).forEach(p => {
                if(p.isDead || !p.tail) return;
                ctx.fillStyle = p.color;
                p.tail.forEach(s => ctx.fillRect(s.x*grid, s.y*grid, grid-1, grid-1));
            });
            
            // Yemekleri çiz
            ctx.fillStyle = "gold";
            foods.forEach(f => ctx.fillRect(f.x*grid, f.y*grid, grid-1, grid-1));
        }

        // Firebase dinleyicileri (timer güncellemesi için)
        db.ref('game/boss/timer').on('value', snap => {
            let t = snap.val();
            document.getElementById("boss-timer").innerText = t > 0 ? "BOSS GELİYOR: " + t : "BOSS SAHADA!";
            bossSnake.timer = t;
        });

        // ... Diğer fonksiyonlar (movePlayer, die, updateUI vb. önceki koddan aynen devam edecek)
    </script>
</body>
</html>
