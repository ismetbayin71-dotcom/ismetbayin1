<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Snake Royale - Victory Edition</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* EKRAN YÖNETİMİ */
        .screen { background: #1e1e1e; padding: 40px; border-radius: 20px; border: 2px solid #333; width: 350px; box-shadow: 0 0 50px rgba(0,0,0,0.5); display: none; }
        #login-view { display: block; } /* Sadece login açık başlar */
        
        #game-screen { background: transparent; border: none; width: auto; box-shadow: none; display: none; flex-direction: row; gap: 20px; position: relative; }
        
        canvas { border: 5px solid #333; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #sidebar { width: 220px; background: #1e1e1e; padding: 20px; border-radius: 10px; border: 2px solid #333; text-align: left; }
        
        input[type="text"] { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; width: 85%; margin-bottom: 15px; }
        .player-item { padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .alive { color: #2ecc71; font-weight: bold; margin-bottom: 5px; }
        .dead { color: #ff4757; text-decoration: line-through; opacity: 0.6; margin-bottom: 5px; }
        
        /* GERİ SAYIM METNİ */
        #countdown { position: absolute; top: 50%; left: 40%; transform: translate(-50%, -50%); font-size: 150px; font-weight: bold; color: #f1c40f; display: none; z-index: 100; pointer-events: none; text-shadow: 0 0 30px rgba(0,0,0,1); }
        
        /* YENİ: KAZANAN EKRANI STİLİ */
        #victory-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* Yarı saydam siyah arka plan */
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; /* Her şeyin üzerinde */
            animation: fadeInVictory 0.5s; /* Hafif belirme efekti */
        }
        @keyframes fadeInVictory { from { opacity: 0; } to { opacity: 1; } }
        
        #victory-image { width: 300px; height: auto; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 0 30px rgba(241, 196, 15, 0.5); }
        #victory-text { font-size: 48px; font-weight: bold; color: #f1c40f; text-shadow: 0 0 20px rgba(0,0,0,1); }
        #winner-name { color: #2ecc71; font-size: 60px; }
        
        button { padding: 12px 25px; border-radius: 8px; border: none; background: #3498db; color: white; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button#readyBtn.ready-on { background: #2ecc71; } /* Hazır olunca yeşil buton */
    </style>
</head>
<body>

    <div id="login-view" class="screen">
        <h2>Snake Royale</h2>
        <input type="text" id="usernameInput" placeholder="Kullanıcı Adın" maxlength="12">
        <div style="margin-bottom:10px;">Renk: <input type="color" id="colorInput" value="#2ecc71"></div>
        <button id="mainJoinBtn" onclick="joinLobby()">Lobiye Katıl</button>
    </div>

    <div id="lobby-view" class="screen">
        <h3>Lobi</h3>
        <div id="player-list"></div>
        <button id="readyBtn" onclick="toggleReady()">HAZIR DEĞİL</button>
        <button onclick="leaveGame()" style="background:#444; margin-top:10px; font-size:12px;">Ayrıl</button>
    </div>

    <div id="game-screen">
        <div id="countdown">3</div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="sidebar">
            <h4 style="border-bottom:1px solid #444; padding-bottom:10px;">Skorlar</h4>
            <div id="status-list"></div>
            <button onclick="leaveGame()" style="background:#444; margin-top:30px;">Oyundan Çık</button>
        </div>
    </div>

    <div id="victory-screen">
        <img id="victory-image" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3ezpyHQqRx8RR8qIuLyMRhCmfxnt3YOsISA&s" alt="Kupa">
        <div id="victory-text">KAZANAN</div>
        <div id="winner-name">...</div>
        <p style="color:#aaa; margin-top:20px;">Lobiye dönülüyor...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBktCn2NgiO0zWrZCSHLsjTXvhkNRDNSi4",
            authDomain: "snake-e0eac.firebaseapp.com",
            databaseURL: "https://snake-e0eac-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "snake-e0eac",
            storageBucket: "snake-e0eac.firebasestorage.app",
            messagingSenderId: "788073914029",
            appId: "1:788073914029:web:dd7fcb83d11483ef31f024"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let myId = Math.random().toString(36).substring(7);
        let myData = { id: myId, name: "", color: "", x: 0, y: 0, dx: 1, dy: 0, tail: [], maxLength: 3, isDead: false, isReady: false };
        let allPlayers = {};
        let gameStatus = "waiting"; 
        let localInLobby = false;
        let inputQueue = [];
        let foods = [];

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        const tileCount = 30;

        function joinLobby() {
            const nameInput = document.getElementById("usernameInput");
            if(!nameInput.value.trim()) return alert("İsim gir!");
            document.getElementById("mainJoinBtn").disabled = true;
            myData.name = nameInput.value;
            myData.color = document.getElementById("colorInput").value;

            db.ref('players').once('value', snap => {
                if (snap.numChildren() === 0) {
                    db.ref('/').update({ 'game/state': { status: "waiting", winner: "" }, 'game/foods': null, 'players': null }).then(completeJoin);
                } else { completeJoin(); }
            });
        }

        function completeJoin() {
            localInLobby = true;
            document.getElementById("login-view").style.display = "none";
            document.getElementById("lobby-view").style.display = "block";
            
            const playerRef = db.ref('players/' + myId);
            playerRef.set(myData);
            playerRef.onDisconnect().remove();
        }

        function toggleReady() {
            myData.isReady = !myData.isReady;
            const btn = document.getElementById("readyBtn");
            btn.innerText = myData.isReady ? "HAZIRSIN" : "HAZIR DEĞİL";
            btn.classList.toggle("ready-on", myData.isReady);
            db.ref('players/' + myId).update({ isReady: myData.isReady });
        }

        function leaveGame() {
            db.ref('players/' + myId).remove().then(() => { window.location.reload(); });
        }

        db.ref('players').on('value', snap => {
            const data = snap.val() || {};
            allPlayers = data;
            let total = 0, ready = 0, aliveCount = 0, lastAlive = null;
            Object.values(data).forEach(p => {
                if(p.name) { 
                    total++; 
                    if(p.isReady) ready++; 
                    if(!p.isDead) { aliveCount++; lastAlive = p; }
                }
            });

            updateLobbyUI();
            updateSidebarUI();

            if(localInLobby && total >= 1 && ready === total && gameStatus === "waiting") {
                const leader = Object.keys(data).sort()[0];
                if(myId === leader) {
                    db.ref('game/state').set({ status: "counting", winner: "" });
                    resetFoods();
                }
            }

            // Kazanan Kontrolü
            if(gameStatus === "playing" && total > 1 && aliveCount === 1) {
                const leader = Object.keys(data).sort()[0];
                if(myId === leader) {
                    db.ref('game/state').update({ status: "finished", winner: lastAlive.name });
                }
            } else if(gameStatus === "playing" && total >= 1 && aliveCount === 0) {
                 const leader = Object.keys(data).sort()[0];
                 if(myId === leader) db.ref('game/state').update({ status: "finished", winner: "BERABERE" });
            }
        });

        db.ref('game/state').on('value', snap => {
            const state = snap.val();
            if(!state || !localInLobby) return;

            if(state.status === "counting" && gameStatus === "waiting") {
                startCountdown();
            }
            if(state.status === "finished" && gameStatus !== "finished") {
                showWinnerUI(state.winner); // YENİ: Kazanan ekranını açan fonksiyon
            }
            if(state.status === "waiting") {
                gameStatus = "waiting";
            }
        });

        function startCountdown() {
            gameStatus = "counting";
            document.getElementById("lobby-view").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";
            calculateSpawnPosition();
            
            let c = 3;
            const cd = document.getElementById("countdown");
            cd.style.display = "block";
            const timer = setInterval(() => {
                cd.innerText = c;
                if(c === 0) { clearInterval(timer); cd.style.display = "none"; gameStatus = "playing"; }
                c--;
            }, 1000);
        }

        // YENİ: KAZANAN EKRANINI GÖSTEREN FONKSİYON
        function showWinnerUI(name) {
            gameStatus = "finished";
            const victoryScreen = document.getElementById("victory-screen");
            const winnerNameDiv = document.getElementById("winner-name");
            
            winnerNameDiv.innerText = name; // Kazananın ismini yaz
            victoryScreen.style.display = "flex"; // Ekranı aç
            
            // 5 Saniye sonra lobiye dön
            setTimeout(() => {
                victoryScreen.style.display = "none"; // Ekranı kapat
                document.getElementById("game-screen").style.display = "none";
                document.getElementById("lobby-view").style.display = "block";
                
                // Durumu lobi için sıfırla
                myData.isReady = false;
                myData.isDead = false;
                myData.tail = [];
                myData.maxLength = 3;
                document.getElementById("readyBtn").innerText = "HAZIR DEĞİL";
                document.getElementById("readyBtn").classList.remove("ready-on");
                
                db.ref('players/' + myId).set(myData);
                gameStatus = "waiting";

                // Eğer odanın lideriyse oyun durumunu da "bekleme"ye çek
                const leader = Object.keys(allPlayers).sort()[0];
                if(myId === leader) {
                    db.ref('game/state').set({ status: "waiting", winner: "" });
                }
            }, 5000);
        }

        db.ref('game/foods').on('value', snap => { foods = snap.val() || []; });
        
        function updateLobbyUI() {
            const list = document.getElementById("player-list");
            list.innerHTML = "";
            Object.values(allPlayers).forEach(p => {
                if(!p.name) return;
                list.innerHTML += `<div class="player-item"><span>${p.name}</span><span class="${p.isReady?'is-ready':'not-ready'}">${p.isReady?'HAZIR':'...'}</span></div>`;
            });
        }

        function updateSidebarUI() {
            const list = document.getElementById("status-list");
            list.innerHTML = "";
            Object.values(allPlayers).sort((a,b)=>b.maxLength-a.maxLength).forEach(p=>{
                if(!p.name) return;
                list.innerHTML += `<div style="color:${p.color}; font-weight:bold; ${p.isDead?'text-decoration:line-through;opacity:0.5':''}">${p.name}: ${p.maxLength}</div>`;
            });
        }

        function calculateSpawnPosition() {
            const playersArr = Object.keys(allPlayers).sort();
            const myIndex = playersArr.indexOf(myId);
            myData.x = Math.floor(15 + Math.cos((myIndex/playersArr.length)*Math.PI*2) * 8);
            myData.y = Math.floor(15 + Math.sin((myIndex/playersArr.length)*Math.PI*2) * 8);
            myData.dx = (myData.x < 15) ? 1 : -1; myData.dy = 0;
            myData.isDead = false; myData.maxLength = 3; myData.tail = [{x:myData.x, y:myData.y}];
            inputQueue = [];
            db.ref('players/' + myId).set(myData);
        }

        function resetFoods() {
            let f = []; for(let i=0;i<8;i++) f.push({x:Math.floor(Math.random()*tileCount), y:Math.floor(Math.random()*tileCount)});
            db.ref('game/foods').set(f);
        }

        document.addEventListener("keydown", e => {
            if(gameStatus !== "playing" || myData.isDead) return;
            const validKeys = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"];
            if(validKeys.includes(e.key)) {
                const lastInput = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : null;
                if (e.key !== lastInput) inputQueue.push(e.key);
                if(inputQueue.length > 2) inputQueue.shift();
            }
        });

        setInterval(() => {
            if(gameStatus === "playing" && !myData.isDead) {
                if (inputQueue.length > 0) {
                    const nextMove = inputQueue.shift();
                    if(nextMove === "ArrowUp" && myData.dy !== 1)    { myData.dx = 0; myData.dy = -1; }
                    else if(nextMove === "ArrowDown" && myData.dy !== -1) { myData.dx = 0; myData.dy = 1; }
                    else if(nextMove === "ArrowLeft" && myData.dx !== 1)  { myData.dx = -1; myData.dy = 0; }
                    else if(nextMove === "ArrowRight" && myData.dx !== -1) { myData.dx = 1; myData.dy = 0; }
                }

                myData.x = (myData.x + myData.dx + tileCount) % tileCount;
                myData.y = (myData.y + myData.dy + tileCount) % tileCount;

                Object.values(allPlayers).forEach(p => {
                    if(!p.tail || p.isDead) return;
                    p.tail.forEach(seg => { if(myData.x === seg.x && myData.y === seg.y && (p.id !== myId || myData.tail.length > 2)) die(); });
                });

                foods.forEach((f, i) => {
                    if(myData.x === f.x && myData.y === f.y) {
                        myData.maxLength++;
                        let n = [...foods]; n[i] = {x:Math.floor(Math.random()*tileCount), y:Math.floor(Math.random()*tileCount)};
                        db.ref('game/foods').set(n);
                    }
                });
                
                myData.tail.unshift({x:myData.x, y:myData.y});
                while(myData.tail.length > myData.maxLength) myData.tail.pop();
                db.ref('players/' + myId).set(myData);
            }
            draw();
        }, 130);

        function die() { myData.isDead = true; db.ref('players/' + myId).update({ isDead: true }); }
        
        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#111";
            for(let i=0;i<canvas.width;i+=grid){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,600);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(600,i);ctx.stroke();}
            ctx.fillStyle = "#ff4757"; foods.forEach(f=>ctx.fillRect(f.x*grid+2, f.y*grid+2, grid-4, grid-4));
            Object.values(allPlayers).forEach(p => {
                if(!p.tail || p.isDead || !p.name) return;
                p.tail.forEach((seg, i) => {
                    ctx.fillStyle = i === 0 ? p.color : p.color + "99";
                    ctx.fillRect(seg.x*grid+1, seg.y*grid+1, grid-2, grid-2);
                    if(i === 0) { ctx.fillStyle = "white"; ctx.font = "10px Arial"; ctx.fillText(p.name, seg.x*grid, seg.y*grid-5); }
                });
            });
        }
    </script>
</body>
</html>
